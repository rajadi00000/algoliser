<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Algoliser</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the current path into a query param and redirects to index.html.
      // pathSegmentsToKeep = 1 for project pages (e.g. username.github.io/repo-name/).
      // Set to 0 if deploying to a custom domain or user/org site (username.github.io).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
